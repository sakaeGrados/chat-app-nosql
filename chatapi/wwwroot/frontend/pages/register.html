<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - Registro</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Crear Cuenta</h1>
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="phoneNumber">Teléfono</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                    <small class="form-hint">Mínimo 6 caracteres, 1 mayúscula, 1 número</small>
                </div>
                <button type="submit" class="btn-primary">Registrarse</button>
            </form>
            <p class="auth-link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
        </div>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const password = formData.get('password');
            
            // Validate password
            if (!UI.validatePassword(password)) {
                UI.showError('La contraseña debe tener al menos 6 caracteres, 1 mayúscula y 1 número');
                return;
            }
            
            const userData = {
                username: formData.get('username'),
                phoneNumber: formData.get('phoneNumber'),
                password: password
            };
            await Auth.register(userData);
        });
    </script>
</body>
</html>
